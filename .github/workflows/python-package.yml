name: Build PTDLauncher

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow pygame pygetwindow requests pyinstaller

      - name: Build for Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --icon=resources/1.ico `
            --add-data "resources/1.ico;resources" `
            --add-data "resources/2.ico;resources" `
            --add-data "resources/top.png;resources" `
            --add-data "resources/settings.png;resources" `
            --add-data "resources/update.png;resources" `
            --add-data "resources/config.json;resources" `
            --add-data "resources/Closetab.mp3;resources" `
            --add-data "resources/mewtab.mp3;resources" `
            --add-data "resources/off.mp3;resources" `
            --add-data "resources/on.mp3;resources" `
            PTDLauncher.py

      - name: Build for Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed --icon=resources/1.ico \
            --add-data "resources/1.ico:resources" \
            --add-data "resources/2.ico:resources" \
            --add-data "resources/top.png:resources" \
            --add-data "resources/settings.png:resources" \
            --add-data "resources/update.png:resources" \
            --add-data "resources/config.json:resources" \
            --add-data "resources/Closetab.mp3:resources" \
            --add-data "resources/mewtab.mp3:resources" \
            --add-data "resources/off.mp3:resources" \
            --add-data "resources/on.mp3:resources" \
            PTDLauncher.py

      - name: Build for macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --icon=resources/1.ico \
            --add-data "resources/1.ico:resources" \
            --add-data "resources/2.ico:resources" \
            --add-data "resources/top.png:resources" \
            --add-data "resources/settings.png:resources" \
            --add-data "resources/update.png:resources" \
            --add-data "resources/config.json:resources" \
            --add-data "resources/Closetab.mp3:resources" \
            --add-data "resources/mewtab.mp3:resources" \
            --add-data "resources/off.mp3:resources" \
            --add-data "resources/on.mp3:resources" \
            PTDLauncher.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTDLauncher-${{ runner.os }}
          path: dist/PTDLauncher*
